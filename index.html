<!DOCTYPE html>  <html lang="pt-BR">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>YouTube</title>  
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">  
  <style>  
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }  :root {  
  --bg: #0f0f0f;  
  --surface: #212121;  
  --surface2: #272727;  
  --border: #3f3f3f;  
  --text: #f1f1f1;  
  --text-muted: #aaa;  
  --red: #ff0000;  
  --hover: rgba(255,255,255,0.1);  
  --sidebar-w: 240px;  
}  

body {  
  font-family: 'Roboto', sans-serif;  
  background: var(--bg);  
  color: var(--text);  
  min-height: 100vh;  
  overflow-x: hidden;  
}  

/* ── HEADER ── */  
header {  
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;  
  height: 56px;  
  background: var(--bg);  
  display: flex; align-items: center;  
  padding: 0 16px;  
  gap: 8px;  
}  

.header-left {  
  display: flex; align-items: center; gap: 16px;  
  min-width: 200px;  
}  

.menu-btn {  
  background: none; border: none; cursor: pointer;  
  color: var(--text); padding: 8px; border-radius: 50%;  
  display: flex; align-items: center; justify-content: center;  
  transition: background .15s;  
}  
.menu-btn:hover { background: var(--hover); }  

.logo { display: flex; align-items: center; gap: 2px; text-decoration: none; }  
.logo svg { width: 90px; height: 20px; }  

.header-center {  
  flex: 1; display: flex; align-items: center; gap: 8px;  
  max-width: 728px; margin: 0 auto;  
}  

.search-wrapper {  
  flex: 1; display: flex; align-items: center;  
  border: 1px solid var(--border);  
  border-radius: 40px 0 0 40px;  
  overflow: hidden;  
  background: #121212;  
}  
.search-wrapper:focus-within {  
  border-color: #1c62b9;  
  box-shadow: 0 0 0 1px #1c62b9 inset;  
}  

.search-input {  
  flex: 1; padding: 8px 16px;  
  background: transparent; border: none; outline: none;  
  color: var(--text); font-size: 16px;  
}  
.search-input::placeholder { color: var(--text-muted); }  

.search-btn {  
  background: var(--surface); border: none;  
  border-left: 1px solid var(--border);  
  cursor: pointer; color: var(--text);  
  padding: 8px 20px; height: 40px;  
  display: flex; align-items: center;  
  transition: background .15s;  
}  
.search-btn:hover { background: var(--surface2); }  

.mic-btn {  
  background: var(--surface2); border: none; border-radius: 50%;  
  width: 40px; height: 40px; cursor: pointer; color: var(--text);  
  display: flex; align-items: center; justify-content: center;  
  transition: background .15s;  
}  
.mic-btn:hover { background: var(--border); }  

.header-right {  
  display: flex; align-items: center; gap: 8px;  
  margin-left: auto;  
}  

.icon-btn {  
  background: none; border: none; cursor: pointer;  
  color: var(--text); padding: 8px; border-radius: 50%;  
  display: flex; align-items: center; justify-content: center;  
  transition: background .15s; position: relative;  
}  
.icon-btn:hover { background: var(--hover); }  

.sign-in-btn {  
  display: flex; align-items: center; gap: 6px;  
  border: 1px solid #3ea6ff; border-radius: 20px;  
  background: transparent; color: #3ea6ff;  
  padding: 6px 14px; cursor: pointer; font-size: 14px; font-weight: 500;  
  transition: background .15s;  
}  
.sign-in-btn:hover { background: rgba(62,166,255,.1); }  

/* ── SIDEBAR ── */  
.sidebar {  
  position: fixed; top: 56px; left: 0;  
  width: var(--sidebar-w);  
  height: calc(100vh - 56px);  
  background: var(--bg);  
  overflow-y: auto; padding: 12px 0;  
  scrollbar-width: none;  
  z-index: 90;  
}  
.sidebar::-webkit-scrollbar { display: none; }  

.sidebar-section { margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }  
.sidebar-section:last-child { border-bottom: none; }  

.sidebar-label {  
  padding: 8px 24px; font-size: 13px; font-weight: 500;  
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px;  
}  

.sidebar-item {  
  display: flex; align-items: center; gap: 24px;  
  padding: 10px 24px; cursor: pointer;  
  border-radius: 10px; margin: 0 8px;  
  transition: background .1s; text-decoration: none; color: var(--text);  
  font-size: 14px; font-weight: 400;  
}  
.sidebar-item:hover, .sidebar-item.active { background: var(--hover); }  
.sidebar-item.active { font-weight: 500; }  
.sidebar-item svg { flex-shrink: 0; }  

/* ── MAIN ── */  
main {  
  margin-left: var(--sidebar-w);  
  margin-top: 56px;  
  padding: 24px 24px;  
}  

/* chips */  
.chips {  
  display: flex; gap: 8px; overflow-x: auto;  
  scrollbar-width: none; margin-bottom: 24px;  
  position: sticky; top: 56px; z-index: 80;  
  background: var(--bg); padding: 12px 0;  
}  
.chips::-webkit-scrollbar { display: none; }  

.chip {  
  flex-shrink: 0; padding: 6px 12px; border-radius: 8px;  
  background: var(--surface); border: none; cursor: pointer;  
  color: var(--text); font-size: 14px; transition: background .15s;  
  white-space: nowrap;  
}  
.chip:hover { background: var(--surface2); }  
.chip.active { background: var(--text); color: var(--bg); }  

/* grid */  
.grid {  
  display: grid;  
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));  
  gap: 16px 8px;  
}  

.card { cursor: pointer; }  
.card:hover .thumb img { transform: scale(1.03); }  

.thumb {  
  position: relative; border-radius: 12px; overflow: hidden;  
  background: var(--surface); aspect-ratio: 16/9;  
}  
.thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; display: block; }  
.duration {  
  position: absolute; bottom: 6px; right: 6px;  
  background: rgba(0,0,0,.8); color: #fff;  
  font-size: 12px; font-weight: 500; padding: 2px 4px; border-radius: 4px;  
}  

.card-meta { display: flex; gap: 12px; margin-top: 12px; }  

.avatar {  
  width: 36px; height: 36px; border-radius: 50%; overflow: hidden;  
  flex-shrink: 0; background: var(--surface);  
}  
.avatar img { width: 100%; height: 100%; object-fit: cover; }  

.card-info { flex: 1; min-width: 0; }  
.card-title {  
  font-size: 14px; font-weight: 500; line-height: 1.4;  
  display: -webkit-box; -webkit-line-clamp: 2;  
  -webkit-box-orient: vertical; overflow: hidden;  
  color: var(--text);  
}  
.card-channel { font-size: 13px; color: var(--text-muted); margin-top: 4px; }  
.card-stats { font-size: 13px; color: var(--text-muted); }  

/* scrollbar */  
::-webkit-scrollbar { width: 6px; }  
::-webkit-scrollbar-track { background: transparent; }  
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
